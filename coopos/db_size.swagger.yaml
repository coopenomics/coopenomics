openapi: 3.0.0
info:
  title: API размера БД COOPOS
  description: Спецификация DB Size API узла COOPOS (nodeos). Включение плагина — в документации на https://coopenomics.world.
  version: 1.0.0
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  contact:
    url: https://coopenomics.world
servers:
  - url: '{protocol}://{host}:{port}/v1/'
    variables:
      protocol:
        enum:
          - http
          - https
        default: http
      host:
        default: localhost
      port:
        default: "8080"
components:
  schemas: {}
paths:
  /db_size/get:
    post:
      summary: Получить статистику
      description: Возвращает статистику по размеру и использованию базы данных узла.
      operationId: get
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties: {}
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                type: object
                description: Показатели базы данных
                properties:
                  free_bytes:
                    type: integer
                  used_bytes:
                    type: integer
                  size:
                    type: integer
                  indices:
                    type: array
                    items:
                      type: object
                      properties:
                        index:
                          type: string
                        row_count:
                          type: integer
