type: "object"
additionalProperties: false
minProperties: 7
required:
  - "id"
  - "actions"
  - "status"
  - "cpu_usage_us"
  - "net_usage_words"
  - "signatures"
  - "transaction_header"
properties:
  id:
    $ref: "Sha256.yaml"
  actions:
    type: "array"
    items:
      $ref: "ActionTraceV0.yaml"
  status:
    type: "string"
    enum:
      - "executed"
      - "soft_fail"
      - "hard_fail"
      - "delayed"
      - "expired"
    description: |
      Статус выполнения:
      * executed — успех, обработчик ошибок не вызывался;
      * soft_fail — объективный сбой (не выполнено), сработал обработчик ошибок;
      * hard_fail — сбой и сбой обработчика, состояние не менялось;
      * delayed — отложенная транзакция;
      * expired — истек срок, место в хранилище возвращено.
  cpu_usage_us:
    type: "integer"
  net_usage_words:
    type: "integer"
  signatures:
    type: "array"
    items:
      $ref: "Signature.yaml"
  transaction_header:
    $ref: "TransactionHeader.yaml"
title: Трассировка транзакции (v1)

